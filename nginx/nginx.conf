# Nginx 主配置文件
# ClipSync 负载均衡

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 基础配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 速率限制
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

    # 上游服务器（ClipSync API 实例）
    upstream clipsync_api {
        # 负载均衡策略：least_conn（最少连接数）
        least_conn;

        # 会话保持（可选，如果需要 sticky session）
        # ip_hash;

        # 后端实例（至少2个）
        server clipsync-api-1:3000 max_fails=3 fail_timeout=30s;
        server clipsync-api-2:3000 max_fails=3 fail_timeout=30s;
        # server clipsync-api-3:3000 max_fails=3 fail_timeout=30s;

        # 健康检查（需要 Nginx Plus 或 nginx_upstream_check_module）
        # check interval=3000 rise=2 fall=5 timeout=1000;
    }

    # 包含站点配置
    include /etc/nginx/conf.d/*.conf;
}
