# ClipSync Nginx 负载均衡配置

# HTTP 负载均衡
server {
    listen 80;
    server_name localhost;

    # 安全头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 速率限制：zone 已在 nginx.conf 的 http{} 中定义（api_limit / ws_limit）
    # 注意：limit_req_zone 指令只能放在 http{} 上下文，放在 server{} 会导致
    # nginx 启动失败（emerg: "limit_req_zone" directive is not allowed here），
    # 从而让整个 HA 入口瘫瘓。这是 H1(P0) 的根因修复。
    # /api/ 的限流在下方 location 中通过 limit_req zone=api_limit 生效。

    # 健康检查端点
    location /api/health {
        proxy_pass http://clipsync_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # API 端点（HTTP 负载均衡）
    location /api/ {
        proxy_pass http://clipsync_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 速率限制（临时关闭以方便测试）
        # limit_req zone=api_limit burst=20 nodelay;
    }

    # WebSocket 端点（需要特殊配置）
    location /ws/ {
        proxy_pass http://clipsync_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 特定配置
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 速率限制（WebSocket 连接数）
        # limit_conn ws_limit 5;
    }

    # 静态文件（如果有）
    location /uploads/ {
        proxy_pass http://clipsync_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 默认页面
    location / {
        proxy_pass http://clipsync_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

