apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clipsync
commonLabels:
  env: production

resources:
  - ../../base

# 生产环境覆盖配置
patches:
  # API: 多副本 + 大规格资源
  - target:
      kind: Deployment
      name: clipsync-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

  # PostgreSQL: 高规格生产配置
  - target:
      kind: Deployment
      name: clipsync-postgres
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

  # Redis: 高规格生产配置
  - target:
      kind: Deployment
      name: clipsync-redis
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/command
        value:
          - redis-server
          - --appendonly
          - "yes"
          - --appendfsync
          - "everysec"
          - --maxmemory
          - 512mb
          - --maxmemory-policy
          - allkeys-lru
          - --requirepass
          - "$(REDIS_PASSWORD)"

  # PVC: 生产级容量
  - target:
      kind: PersistentVolumeClaim
      name: postgres-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 50Gi

  - target:
      kind: PersistentVolumeClaim
      name: redis-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 10Gi

  - target:
      kind: PersistentVolumeClaim
      name: uploads-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 100Gi

  # HPA: 扩大范围
  - target:
      kind: HorizontalPodAutoscaler
      name: clipsync-api-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20

configMapGenerator:
  - name: clipsync-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      # ⚠️ 生产环境必须替换为真实域名
      - ALLOWED_ORIGINS=https://app.clipsync.app,https://sync.clipsync.app
