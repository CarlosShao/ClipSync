apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clipsync-ingress
  namespace: clipsync
  labels:
    app.kubernetes.io/name: clipsync
  annotations:
    # Nginx Ingress 配置
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-socket-timeout: "3600"
    # TLS 自动签发（需 cert-manager）
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.clipsync.com
        - app.clipsync.com
      secretName: clipsync-tls
  rules:
    - host: api.clipsync.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clipsync-api
                port:
                  number: 80
    - host: app.clipsync.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clipsync-api
                port:
                  number: 80
---
# 健康检查 Ingress（可选，用于监控）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clipsync-health
  namespace: clipsync
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: health.clipsync.com
      http:
        paths:
          - path: /health
            pathType: Exact
            backend:
              service:
                name: clipsync-api
                port:
                  number: 80
