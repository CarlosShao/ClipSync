apiVersion: apps/v1
kind: Deployment
metadata:
  name: clipsync-api
  namespace: clipsync
  labels:
    app.kubernetes.io/name: clipsync
    app.kubernetes.io/component: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: clipsync
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clipsync
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', '
            until nc -z clipsync-postgres 5432; do
              echo "Waiting for PostgreSQL...";
              sleep 2;
            done;
            until nc -z clipsync-redis 6379; do
              echo "Waiting for Redis...";
              sleep 2;
            done;
            echo "Database is ready!";
          ']
      containers:
        - name: api
          image: clipsync/server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
            - containerPort: 3000
              protocol: TCP
              name: ws  # WebSocket 复用 HTTP 端口
          envFrom:
            - configMapRef:
                name: clipsync-config
            - secretRef:
                name: clipsync-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: uploads-data
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # 需要 upload 写入权限
            capabilities:
              drop:
                - ALL
      volumes:
        - name: uploads-data
          persistentVolumeClaim:
            claimName: uploads-data
---
apiVersion: v1
kind: Service
metadata:
  name: clipsync-api
  namespace: clipsync
  labels:
    app.kubernetes.io/name: clipsync
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: clipsync
    app.kubernetes.io/component: api
---
# HPA - 自动水平扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: clipsync-api-hpa
  namespace: clipsync
  labels:
    app.kubernetes.io/name: clipsync
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: clipsync-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
# PodDisruptionBudget - 保证可用性
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: clipsync-api-pdb
  namespace: clipsync
  labels:
    app.kubernetes.io/name: clipsync
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clipsync
      app.kubernetes.io/component: api
