# ClipSync 监控栈 Docker Compose 配置
# 使用: docker compose -f docker-compose.monitoring.yml up -d

services:
  # Prometheus 监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: clipsync-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - clipsync-monitoring-net
    labels:
      - "com.clipsync.service=prometheus"
      - "com.clipsync.env=monitoring"

  # Alertmanager 告警管理器
  alertmanager:
    image: prom/alertmanager:latest
    container_name: clipsync-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - clipsync-monitoring-net
    labels:
      - "com.clipsync.service=alertmanager"
      - "com.clipsync.env=monitoring"

  # Blackbox Exporter（HTTP/SSL/TCP 探测）
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: clipsync-blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    networks:
      - clipsync-monitoring-net
    labels:
      - "com.clipsync.service=blackbox-exporter"
      - "com.clipsync.env=monitoring"

  # Grafana 可视化服务
  grafana:
    image: grafana/grafana:latest
    container_name: clipsync-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=clipsync2024
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - clipsync-monitoring-net
    labels:
      - "com.clipsync.service=grafana"
      - "com.clipsync.env=monitoring"

  # Node Exporter（系统指标收集）
  node-exporter:
    image: prom/node-exporter:latest
    container_name: clipsync-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^(/sys|/proc|/dev|/host|/etc)($$|/)'
    networks:
      - clipsync-monitoring-net
    labels:
      - "com.clipsync.service=node-exporter"
      - "com.clipsync.env=monitoring"

networks:
  clipsync-monitoring-net:
    driver: bridge
    labels:
      - "com.clipsync.env=monitoring"

volumes:
  prometheus_data:
    labels:
      - "com.clipsync.service=prometheus"
  alertmanager_data:
    labels:
      - "com.clipsync.service=alertmanager"
  grafana_data:
    labels:
      - "com.clipsync.service=grafana"
