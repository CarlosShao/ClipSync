# ClipSync 多实例部署 Docker Compose 配置
# 使用: docker compose -f docker-compose.multi.yml up -d

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: clipsync-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-clipsync}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clipsync123}
      POSTGRES_DB: ${DB_NAME:-clipsync}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clipsync}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clipsync-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: clipsync-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-clipsync123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-clipsync123}", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - clipsync-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5

  # ClipSync API 实例 1
  api-1:
    build:
      context: ./src/server
      dockerfile: Dockerfile
    container_name: clipsync-api-1
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      TZ: Asia/Shanghai
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-clipsync}
      DB_USER: ${DB_USER:-clipsync}
      DB_PASSWORD: ${DB_PASSWORD:-clipsync123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-clipsync123}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-32byte-encryption-key!!!!}
      CSRF_SECRET: ${CSRF_SECRET:-your-csrf-secret}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clipsync-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ClipSync API 实例 2
  api-2:
    build:
      context: ./src/server
      dockerfile: Dockerfile
    container_name: clipsync-api-2
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      TZ: Asia/Shanghai
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-clipsync}
      DB_USER: ${DB_USER:-clipsync}
      DB_PASSWORD: ${DB_PASSWORD:-clipsync123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-clipsync123}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-32byte-encryption-key!!!!}
      CSRF_SECRET: ${CSRF_SECRET:-your-csrf-secret}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clipsync-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: 2.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Nginx 负载均衡
  nginx:
    image: nginx:alpine
    container_name: clipsync-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api-1
      - api-2
    networks:
      - clipsync-net
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5

networks:
  clipsync-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
