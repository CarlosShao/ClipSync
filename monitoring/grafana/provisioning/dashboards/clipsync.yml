# Grafana 仪表盘配置
# 自动导入预定义的仪表盘

apiVersion: 1

providers:
  - name: 'ClipSync Dashboards'
    orgId: 1
    folder: 'ClipSync'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
